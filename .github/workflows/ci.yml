name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    name: Lint entrypoint.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t refactoringminer-action-test .
