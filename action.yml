name: 'RefactoringMiner Report'
description: 'Detects refactorings in commits/PRs and posts a markdown report as a PR comment'
author: 'Parsa Hejazi'

branding:
  icon: 'search'
  color: 'green'

inputs:
  github-token:
    description: 'Token used to post the PR comment'
    required: true
    default: ${{ github.token }}
  image:
    description: 'RefactoringMiner Docker image to use (e.g. tsantalis/refactoringminer:3.0.9)'
    required: false
    default: 'tsantalis/refactoringminer:latest'
  enable-web-view:
    description: 'Export the interactive AST-diff view and link it in the PR comment (GitHub Pages on public repos, workflow artifact otherwise)'
    required: false
    default: 'true'

runs:
  using: 'node24'
  main: 'dist/index.js'
  